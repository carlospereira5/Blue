services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: kiosko
      POSTGRES_PASSWORD: kiosko
      POSTGRES_DB: blue
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiosko -d blue"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
